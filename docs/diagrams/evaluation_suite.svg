<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" role="img" aria-labelledby="title desc">
  <title id="title">Suite de evaluacion mixta</title>
  <desc id="desc">Diagrama de comparacion entre fuentes full pitch y television.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .full { fill: #e8f7f0; stroke: #176b5d; stroke-width: 2; rx: 8; }
      .tv { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
      .out { fill: #fff7e6; stroke: #b7791f; stroke-width: 2; rx: 8; }
      .text { font: 18px Arial, Helvetica, sans-serif; fill: #17202a; text-anchor: middle; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #475569; text-anchor: middle; }
      .title { font: 24px Arial, Helvetica, sans-serif; font-weight: 700; fill: #111827; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1180" height="430" fill="#f8fafc"/>
  <text x="40" y="42" class="title">Suite de evaluacion mixta</text>

  <rect x="40" y="80" width="465" height="245" class="lane"/>
  <text x="272" y="116" class="text">Fuentes full-pitch</text>
  <rect x="80" y="145" width="170" height="72" class="full"/>
  <text x="165" y="174" class="text">128058</text>
  <text x="165" y="198" class="small">vista continua</text>
  <rect x="295" y="145" width="170" height="72" class="full"/>
  <text x="380" y="174" class="text">132831</text>
  <text x="380" y="198" class="small">deformacion optica</text>
  <rect x="188" y="240" width="170" height="62" class="full"/>
  <text x="273" y="265" class="text">Clips tacticos</text>
  <text x="273" y="287" class="small">tracking + pases</text>

  <rect x="675" y="80" width="465" height="245" class="lane"/>
  <text x="907" y="116" class="text">Fuentes TV broadcast</text>
  <rect x="715" y="145" width="170" height="72" class="tv"/>
  <text x="800" y="174" class="text">1_720p.mkv</text>
  <text x="800" y="198" class="small">cambios de plano</text>
  <rect x="930" y="145" width="170" height="72" class="tv"/>
  <text x="1015" y="174" class="text">Clips preparados</text>
  <text x="1015" y="198" class="small">logo + close-up</text>
  <rect x="823" y="240" width="170" height="62" class="tv"/>
  <text x="908" y="265" class="text">Deteccion visual</text>
  <text x="908" y="287" class="small">limites tacticos</text>

  <rect x="420" y="350" width="340" height="58" class="out"/>
  <text x="590" y="374" class="text">final_demo/index.html</text>
  <text x="590" y="396" class="small">comparacion, videos, paneles y conclusiones</text>

  <path d="M273 302 C315 345 360 374 420 379" class="arrow"/>
  <path d="M908 302 C865 345 820 374 760 379" class="arrow"/>
</svg>
