project:
  name: football-ai-analysis

video:
  input_path: videos/clips/prepared/clip_00m00s_20s.mp4
  output_dir: videos/output
  process_every_n_frames: 1

model:
  path: yolo26n.pt
  device: cpu
  imgsz: 640
  model_conf: 0.05

classes:
  person_class_id: 0
  ball_class_id: 32

thresholds:
  person_conf: 0.25
  ball_conf: 0.10

frame_analysis:
  min_green_ratio: 0.35
  min_players_for_play_frame: 4
  max_person_area_ratio_for_closeup: 0.25
  ball_memory_frames: 12
  suppress_ball_memory_on_closeup: true

ball_filter:
  ignore_regions:
    - name: tv_logo_bottom_right
      x_min_ratio: 0.82
      y_min_ratio: 0.70
      x_max_ratio: 1.00
      y_max_ratio: 1.00
    - name: university_of_tsukuba_of_o
      source_patterns:
        - "128058*"
        - "128058_*.mp4"
        - "*128058_panorama_1st_half_cortado*"
      x_min_ratio: 0.60
      y_min_ratio: 0.62
      x_max_ratio: 0.69
      y_max_ratio: 0.84
    - name: tsukuba_right_touchline_loose_balls
      source_patterns:
        - "128058*"
        - "128058_*.mp4"
        - "*128058_panorama_1st_half_cortado*"
      x_min_ratio: 0.84
      y_min_ratio: 0.38
      x_max_ratio: 1.00
      y_max_ratio: 0.68
  ignore_below_polylines:
    - name: tsukuba_bottom_touchline_outside_pitch
      source_patterns:
        - "128058*"
        - "128058_*.mp4"
        - "*128058_panorama_1st_half_cortado*"
      margin_ratio: 0.012
      points:
        - x_ratio: 0.00
          y_ratio: 0.55
        - x_ratio: 0.16
          y_ratio: 0.62
        - x_ratio: 0.35
          y_ratio: 0.66
        - x_ratio: 0.50
          y_ratio: 0.67
        - x_ratio: 0.66
          y_ratio: 0.66
        - x_ratio: 0.84
          y_ratio: 0.62
        - x_ratio: 1.00
          y_ratio: 0.55

annotation:
  reference_frame_height: 224
  scale_with_resolution: true
  person_label_scale_ratio: 0.40
  person_label_background_alpha: 0.50
  person_label_offset_px: 4
  person_marker_style: lower_u
  person_marker_height_ratio: 0.25
  person_marker_thickness: 1
  team_render_mode: single-pass
  role_colors:
    team_1: [230, 100, 40]
    team_2: [40, 40, 230]
    goalkeeper_candidate: [0, 220, 255]
    referee_candidate: [245, 245, 245]
    unknown: [245, 245, 245]

tracking:
  enabled: true
  tracker: bytetrack.yaml
  show_track_id: true
  match_iou_threshold: 0.30

stats:
  enabled: true
  output_dir: videos/output/stats
  write_frame_metrics: true

report_panel:
  enabled: false
  output_dir: videos/output/reports

team_classification:
  enabled: true
  method: rgb_kmeans
  num_teams: 2
  min_jersey_samples: 5

team_memory:
  enabled: true
  jersey_crop:
    x_min_ratio: 0.25
    x_max_ratio: 0.75
    y_min_ratio: 0.20
    y_max_ratio: 0.60

role_classification:
  enabled: true
  referee_min_frames: 15
  referee_min_jersey_samples: 4
  referee_min_color_distance: 85.0
  goalkeeper_min_frames: 15
  goalkeeper_goal_zone_x_ratio: 0.18
  goalkeeper_goal_zone_y_ratio: 0.32
  goalkeeper_max_field_span_ratio: 0.28
  referee_prefer_central_area: true
  referee_central_margin_x_ratio: 0.14
  referee_central_margin_y_ratio: 0.12
  mark_stable_unassigned_as_referee: false
  referee_hsv_rules:
    enabled: true
    yellow:
      h_min: 15
      h_max: 45
      s_min: 60
      v_min: 80
    black:
      v_max: 75
      s_max: 80
    white:
      s_max: 55
      v_min: 150

events:
  passes:
    enabled: true
    max_ball_player_distance_ratio: 0.045
    max_pass_gap_frames: 60
    min_frames_between_passes: 8
  out_of_play:
    enabled: false
  goals:
    enabled: false
